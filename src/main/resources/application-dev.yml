spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/careerforge}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,mappings

  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG

jwt:
  secret: ${JWT_SECRET:CareerForgeSuperSecureJwtSecretKey2026ForDevelopmentOnly123456789}